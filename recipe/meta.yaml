{% set version = "6.1" %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-mvn
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/MVN_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/MVN/MVN_{{ version }}.tar.gz
  sha256: 2eff67c07fa8a13e4acff90d5abad902b966de0c01e257a26be7e3dca6396dc6

build:
  number: 0
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/

requirements:
  build:
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - r-mass
    - r-boot
    - r-car
    - r-cli
    - r-dplyr
    - r-energy
    - r-ggplot2
    - r-mice
    - r-moments
    - r-nortest
    - r-plotly
    - r-purrr
    - r-stringr
    - r-tibble
    - r-tidyr
    - r-viridis
  run:
    - r-base
    - r-mass
    - r-boot
    - r-car
    - r-cli
    - r-dplyr
    - r-energy
    - r-ggplot2
    - r-mice
    - r-moments
    - r-nortest
    - r-plotly
    - r-purrr
    - r-stringr
    - r-tibble
    - r-tidyr
    - r-viridis

test:
  commands:
    - $R -e "library('MVN')"           # [not win]
    - "\"%R%\" -e \"library('MVN')\""  # [win]

about:
  home: https://CRAN.R-project.org/package=MVN
  license: MIT
  summary: Performs multivariate normality tests and graphical approaches and implements multivariate outlier detection and univariate normality of marginal distributions through plots and tests, and performs multivariate Box-Cox transformation (Korkmaz et al, (2014), <https://journal.r-project.org/archive/2014-2/korkmaz-goksuluk-zararsiz.pdf>).
  license_family: MIT
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/MIT'
    - LICENSE

extra:
  recipe-maintainers:
    - conda-forge/r
